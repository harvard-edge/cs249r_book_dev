<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Layers of Responsibility</title>
  <desc id="desc">Nested responsibility layers from AI system to development team, organization, industry, and society.</desc>
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Arial, sans-serif; }
      .layer-title { font-size: 12px; font-weight: 700; }
      .layer-detail { font-size: 10px; }
      .anchor-title { font-size: 10px; font-weight: 700; }
      .anchor-detail { font-size: 10px; }
      .note { font-size: 11px; fill: #4f5b66; }
    </style>
    <marker id="arrow-neutral" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#687684"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#3478b9"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#409763"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#d28a2e"/>
    </marker>
  </defs>

  <rect width="720" height="460" fill="#ffffff"/>

  <ellipse cx="360" cy="228" rx="300" ry="176" fill="#ffffff" stroke="#687684" stroke-width="2"/>
  <ellipse cx="360" cy="218" rx="238" ry="142" fill="#fff4e6" stroke="#d28a2e" stroke-width="2.2"/>
  <ellipse cx="360" cy="218" rx="174" ry="104" fill="#eaf6ed" stroke="#409763" stroke-width="2.2"/>
  <ellipse cx="360" cy="218" rx="108" ry="66" fill="#eef6fd" stroke="#3478b9" stroke-width="2.3"/>

  <text x="360" y="28" text-anchor="middle" class="layer-title" fill="#4f5b66">Government / Society</text>
  <text x="360" y="44" text-anchor="middle" class="layer-detail" fill="#687684">regulation, law, public interest</text>

  <text x="360" y="88" text-anchor="middle" class="layer-title" fill="#b76718">Industry</text>
  <text x="360" y="104" text-anchor="middle" class="layer-detail" fill="#b76718">standards, certifications, norms</text>

  <text x="360" y="134" text-anchor="middle" class="layer-title" fill="#2f7d50">Organization</text>
  <text x="360" y="150" text-anchor="middle" class="layer-detail" fill="#2f7d50">policies, audits, governance</text>

  <text x="360" y="184" text-anchor="middle" class="layer-title" fill="#276596">Development Team</text>
  <text x="360" y="200" text-anchor="middle" class="layer-detail" fill="#276596">code, testing, bias checks</text>

  <text x="360" y="224" text-anchor="middle" class="layer-title" fill="#276596">AI System</text>
  <text x="360" y="241" text-anchor="middle" class="layer-detail" fill="#276596">model + infrastructure</text>

  <path d="M468 218 H518" stroke="#3478b9" stroke-width="1.7" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="522" y="194" width="146" height="50" rx="2" fill="#eef6fd" stroke="#3478b9" stroke-width="1.6"/>
  <text x="595" y="213" text-anchor="middle" class="anchor-title" fill="#276596">Fairness testing</text>
  <text x="595" y="228" text-anchor="middle" class="anchor-detail" fill="#276596">model cards</text>
  <text x="595" y="241" text-anchor="middle" class="anchor-detail" fill="#276596">red-teaming</text>

  <path d="M480 286 V304 H458" stroke="#409763" stroke-width="1.7" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="458" y="304" width="170" height="46" rx="2" fill="#eaf6ed" stroke="#409763" stroke-width="1.6"/>
  <text x="543" y="323" text-anchor="middle" class="anchor-title" fill="#2f7d50">Impact assessments</text>
  <text x="543" y="338" text-anchor="middle" class="anchor-detail" fill="#2f7d50">ethical review boards</text>

  <path d="M180 126 H132" stroke="#d28a2e" stroke-width="1.7" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="46" y="106" width="86" height="42" rx="2" fill="#fff4e6" stroke="#d28a2e" stroke-width="1.6"/>
  <text x="89" y="123" text-anchor="middle" class="anchor-title" fill="#b76718">ISO standards</text>
  <text x="89" y="137" text-anchor="middle" class="anchor-detail" fill="#b76718">external audits</text>

  <path d="M126 266 V304 H192" stroke="#687684" stroke-width="1.7" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow-neutral)"/>
  <rect x="46" y="304" width="146" height="46" rx="2" fill="#ffffff" stroke="#687684" stroke-width="1.6"/>
  <text x="119" y="323" text-anchor="middle" class="anchor-title" fill="#4f5b66">GDPR, AI Act</text>
  <text x="119" y="338" text-anchor="middle" class="anchor-detail" fill="#4f5b66">sector-specific law</text>

  <text x="360" y="430" text-anchor="middle" class="note">Accountability extends outward: each layer enforces norms the inner layers cannot self-impose.</text>
</svg>
