<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Reward Hacking Loop</title>
  <desc id="desc">A proxy metric drives observed behavior, which corrupts training data and reinforces misalignment.</desc>
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Arial, sans-serif; }
      .box-title { font-size: 13px; font-weight: 700; }
      .box-text { font-size: 11px; }
      .edge-label { font-size: 10px; font-weight: 700; }
      .law-title { font-size: 11px; font-weight: 700; fill: #b76718; }
      .law-text { font-size: 10.5px; fill: #b76718; }
      .note { font-size: 11px; fill: #4f5b66; }
    </style>
    <marker id="arrow-green" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#409763"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#3478b9"/>
    </marker>
    <marker id="arrow-orange" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#d28a2e"/>
    </marker>
    <marker id="arrow-red" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#c93e4f"/>
    </marker>
  </defs>

  <rect width="720" height="460" fill="#ffffff"/>

  <rect x="86" y="22" width="548" height="34" rx="2" fill="#ffffff" stroke="#d28a2e" stroke-width="1.6"/>
  <text x="360" y="36" text-anchor="middle" class="law-title">Goodhart's Law</text>
  <text x="360" y="50" text-anchor="middle" class="law-text">When a measure becomes a target, it ceases to be a good measure.</text>

  <rect x="252" y="82" width="216" height="64" rx="2" fill="#eaf6ed" stroke="#409763" stroke-width="2.2"/>
  <text x="360" y="105" text-anchor="middle" class="box-title" fill="#2f7d50">True Goal</text>
  <text x="360" y="123" text-anchor="middle" class="box-text" fill="#2f7d50">Maximize user value</text>
  <text x="360" y="138" text-anchor="middle" class="box-text" fill="#2f7d50">long-term engagement and trust</text>

  <rect x="514" y="190" width="150" height="64" rx="2" fill="#eef6fd" stroke="#3478b9" stroke-width="2.2"/>
  <text x="589" y="213" text-anchor="middle" class="box-title" fill="#276596">ML System</text>
  <text x="589" y="231" text-anchor="middle" class="box-text" fill="#276596">Optimizes proxy</text>
  <text x="589" y="246" text-anchor="middle" class="box-text" fill="#276596">metric via gradient</text>

  <rect x="252" y="322" width="216" height="64" rx="2" fill="#fff4e6" stroke="#d28a2e" stroke-width="2.2"/>
  <text x="360" y="345" text-anchor="middle" class="box-title" fill="#b76718">Proxy Metric</text>
  <text x="360" y="363" text-anchor="middle" class="box-text" fill="#b76718">Maximize clicks</text>
  <text x="360" y="378" text-anchor="middle" class="box-text" fill="#b76718">easy to measure, easy to hack</text>

  <rect x="56" y="190" width="180" height="78" rx="2" fill="#fdecee" stroke="#c93e4f" stroke-width="2.2"/>
  <text x="146" y="213" text-anchor="middle" class="box-title" fill="#9f2f3d">Observed Behavior</text>
  <text x="146" y="231" text-anchor="middle" class="box-text" fill="#9f2f3d">Clickbait content</text>
  <text x="146" y="246" text-anchor="middle" class="box-text" fill="#9f2f3d">Outrage amplification</text>
  <text x="146" y="261" text-anchor="middle" class="box-text" fill="#9f2f3d">Filter bubbles</text>

  <rect x="262" y="205" width="196" height="44" rx="2" fill="#fdecee" stroke="#c93e4f" stroke-width="1.7"/>
  <text x="360" y="222" text-anchor="middle" class="box-title" fill="#9f2f3d">Reinforcement Loop</text>
  <text x="360" y="238" text-anchor="middle" class="box-text" fill="#9f2f3d">each cycle worsens misalignment</text>

  <path d="M468 114 H496 V222 H514" stroke="#409763" stroke-width="2.4" fill="none" marker-end="url(#arrow-green)"/>
  <text x="544" y="108" text-anchor="middle" class="edge-label" fill="#2f7d50">designer sets</text>
  <text x="544" y="121" text-anchor="middle" class="edge-label" fill="#2f7d50">objective</text>

  <path d="M589 254 V300 H468 V354" stroke="#3478b9" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="548" y="296" text-anchor="middle" class="edge-label" fill="#276596">measured by</text>

  <path d="M252 354 H174 V268" stroke="#d28a2e" stroke-width="2.4" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="184" y="330" text-anchor="middle" class="edge-label" fill="#b76718">drives</text>

  <path d="M146 190 V114 H252" stroke="#c93e4f" stroke-width="2.4" stroke-dasharray="7 5" fill="none" marker-end="url(#arrow-red)"/>
  <text x="163" y="90" text-anchor="middle" class="edge-label" fill="#9f2f3d">training data reflects</text>
  <text x="163" y="104" text-anchor="middle" class="edge-label" fill="#9f2f3d">the hack</text>

  <text x="360" y="430" text-anchor="middle" class="note">Reward hacking optimizes the proxy, not the intended outcome.</text>
</svg>
