  <line x1="24" y1="18" x2="24" y2="96" stroke="#bbb" stroke-width="2"/>
  <circle cx="24" cy="18" r="8" fill="#4a90c4"/>
  <circle cx="24" cy="44" r="8" fill="#c8c8c8"/>
  <circle cx="24" cy="70" r="8" fill="#c8c8c8"/>
  <circle cx="24" cy="96" r="8" fill="#c8c8c8"/>
  <text x="42" y="22" font-size="10.5" fill="#333">provenance</text>
  <text x="42" y="48" font-size="10.5" fill="#333">explain</text>
  <text x="42" y="74" font-size="10.5" fill="#333">appeal</text>
  <text x="42" y="100" font-size="10.5" fill="#333">outcome</text>
</svg>
