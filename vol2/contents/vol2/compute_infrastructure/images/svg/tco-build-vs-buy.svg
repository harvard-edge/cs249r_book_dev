<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480">
  <rect width="760" height="480" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="380" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Build vs. Buy: Cumulative Cost Break-Even Analysis</text>
  <text x="380" y="40" text-anchor="middle" font-size="9" fill="#555">125-node H100 cluster (1,000 GPUs) at 80% sustained utilization</text>

  <!-- ===== Chart bounds: x=[80,680], y=[80,380] ===== -->

  <!-- Grid lines (horizontal) -->
  <line x1="80" y1="380" x2="680" y2="380" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="80" y1="320" x2="680" y2="320" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="80" y1="260" x2="680" y2="260" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="80" y1="200" x2="680" y2="200" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="80" y1="140" x2="680" y2="140" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="80" y1="80" x2="680" y2="80" stroke="#e8e8e8" stroke-width="0.8"/>

  <!-- Grid lines (vertical - months) -->
  <line x1="80" y1="80" x2="80" y2="380" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="200" y1="80" x2="200" y2="380" stroke="#e8e8e8" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="320" y1="80" x2="320" y2="380" stroke="#e8e8e8" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="440" y1="80" x2="440" y2="380" stroke="#e8e8e8" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="560" y1="80" x2="560" y2="380" stroke="#e8e8e8" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="680" y1="80" x2="680" y2="380" stroke="#e8e8e8" stroke-width="0.8"/>

  <!-- Axes -->
  <line x1="70" y1="380" x2="700" y2="380" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="80" y1="390" x2="80" y2="70" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- X-axis labels (months) -->
  <text x="80" y="398" text-anchor="middle" font-size="9" fill="#555">0</text>
  <text x="200" y="398" text-anchor="middle" font-size="9" fill="#555">6</text>
  <text x="320" y="398" text-anchor="middle" font-size="9" fill="#555">12</text>
  <text x="440" y="398" text-anchor="middle" font-size="9" fill="#555">18</text>
  <text x="560" y="398" text-anchor="middle" font-size="9" fill="#555">24</text>
  <text x="680" y="398" text-anchor="middle" font-size="9" fill="#555">30</text>
  <text x="380" y="415" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Months</text>

  <!-- Y-axis labels ($M) -->
  <text x="72" y="384" text-anchor="end" font-size="9" fill="#555">$0</text>
  <text x="72" y="324" text-anchor="end" font-size="9" fill="#555">$20M</text>
  <text x="72" y="264" text-anchor="end" font-size="9" fill="#555">$40M</text>
  <text x="72" y="204" text-anchor="end" font-size="9" fill="#555">$60M</text>
  <text x="72" y="144" text-anchor="end" font-size="9" fill="#555">$80M</text>
  <text x="72" y="84" text-anchor="end" font-size="9" fill="#555">$100M</text>
  <text x="25" y="230" text-anchor="middle" font-size="10" font-weight="700" fill="#333" transform="rotate(-90 25 230)">Cumulative Cost ($M)</text>

  <!-- ===== Curves & Filled Areas ===== -->

  <!-- Fill area under cloud curve -->
  <polygon points="80,380 680,170 680,380" fill="#fdebd0" fill-opacity="0.3"/>
  <!-- Cloud curve: ~$2.34M/month, $70M over 30 months -->
  <line x1="80" y1="380" x2="680" y2="170" stroke="#c87b2a" stroke-width="3"/>

  <!-- Fill area under on-prem curve -->
  <polygon points="80,380 80,204 680,192.5 680,380" fill="#cfe2f3" fill-opacity="0.25"/>
  <!-- On-prem curve: ~$58.75M upfront + ~$0.125M/month OpEx -->
  <polyline points="80,380 80,204 680,192.5" fill="none" stroke="#4a90c4" stroke-width="3"/>

  <!-- ===== Dashboard & Legends ===== -->
  
  <!-- Utilization dependency note -->
  <rect x="90" y="100" width="200" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="190" y="114" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Break-even requires:</text>
  <text x="190" y="128" text-anchor="middle" font-size="8.5" fill="#555">≈60% sustained utilization</text>
  <text x="190" y="142" text-anchor="middle" font-size="8.5" fill="#555">At 20% util → cloud always wins</text>
  <text x="190" y="154" text-anchor="middle" font-size="8.5" fill="#555">At 80%+ util → on-prem wins ~yr 2</text>

  <!-- Legend Boxes -->
  <rect x="310" y="100" width="145" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="382.5" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">On-Premises</text>

  <rect x="310" y="130" width="145" height="24" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="382.5" y="146" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Cloud (On-Demand)</text>

  <!-- ===== Crossover Annotation ===== -->
  
  <!-- Crossover point marker (Intersection near month 27) -->
  <rect x="561.4" y="100" width="100" height="35" fill="#a31f34"/>
  <text x="611.4" y="115" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Break-Even</text>
  <text x="611.4" y="128" text-anchor="middle" font-size="9" fill="#fff">~Month 27</text>
  
  <!-- Orthogonal Leader Line connecting box to intersection -->
  <line x1="611.4" y1="135" x2="611.4" y2="193.7" stroke="#a31f34" stroke-width="1.5"/>
  <circle cx="611.4" cy="193.7" r="5" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
  
  <!-- Dotted projection to X-axis -->
  <line x1="611.4" y1="193.7" x2="611.4" y2="380" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="611.4" y="375" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">~27</text>

  <!-- ===== Line Annotations & Retained Duplicate Text ===== -->

  <!-- On-Premises Curve Labels -->
  <text x="600" y="192" text-anchor="middle" font-size="9.5" font-weight="700" fill="#4a90c4" transform="rotate(-1 600 192)">On-Premises</text>
  <text x="320" y="199" font-size="8" fill="#4a90c4">+$0.125M/mo OpEx</text>

  <!-- Cloud Curve Labels -->
  <text x="600" y="205" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a" transform="rotate(-19.3 600 205)">Cloud (On-Demand)</text>
  
  <text x="180" y="355" font-size="8.5" font-weight="700" fill="#c87b2a">$2.3M / month</text>
  <text x="180" y="367" font-size="8" fill="#555">(no upfront cost)</text>
  
  <text x="340" y="350" font-size="8" fill="#c87b2a" opacity="0.6">~$2.3M/month</text>
  <text x="340" y="361" font-size="8" fill="#c87b2a" opacity="0.6">$4/GPU-hr × 1,000 GPUs</text>
  <text x="340" y="372" font-size="8" fill="#c87b2a" opacity="0.6">× 80% utilization</text>

  <!-- CapEx Jump Annotations -->
  <text x="90" y="215" font-size="8" fill="#4a90c4">CapEx: ~$58.8M</text>
  <text x="90" y="226" font-size="8" fill="#4a90c4">(hardware + network/facility)</text>
  
  <text x="90" y="260" font-size="8" fill="#4a90c4" opacity="0.6">CapEx: ~$58.8M</text>
  <text x="90" y="271" font-size="8" fill="#4a90c4" opacity="0.6">hardware + network/facility</text>

  <!-- ===== Footer ===== -->
  <text x="380" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">On-premises infrastructure requires ~27 months at 80% utilization to break even versus cloud. Below ~60% utilization, cloud pricing dominates across the full lifecycle.</text>
</svg>
