<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <title id="title">AI Triad at Scale</title>
  <desc id="desc">Algorithm, infrastructure, and data connected by bidirectional scale constraints.</desc>
  <defs>
    <style>
