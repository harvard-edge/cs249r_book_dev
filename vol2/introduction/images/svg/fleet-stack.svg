<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Fleet Stack</title>
  <desc id="desc">Four stacked layers showing the book organization from infrastructure to governance.</desc>
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Arial, sans-serif; }
      .layer-title { font-size: 16px; font-weight: 700; fill: #14213d; }
      .layer-subtitle { font-size: 14px; font-weight: 600; fill: #14213d; }
      .side-title { font-size: 12px; font-weight: 700; fill: #14213d; }
      .side-detail { font-size: 11px; fill: #3c4651; }
      .note { font-size: 11px; fill: #4f5b66; }
    </style>
    <marker id="up-arrow" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#3478b9"/>
    </marker>
  </defs>

  <rect width="720" height="420" fill="#ffffff"/>

  <g transform="translate(58 38)">
    <rect x="42" y="238" width="360" height="56" rx="5" fill="#eef6fd" stroke="#3478b9" stroke-width="2"/>
    <text x="222" y="260" text-anchor="middle" class="layer-title">Part I: The Fleet</text>
    <text x="222" y="280" text-anchor="middle" class="layer-subtitle">Compute, Network, Data</text>

    <rect x="10" y="164" width="424" height="56" rx="5" fill="#f0edf9" stroke="#7567b3" stroke-width="2"/>
    <text x="222" y="186" text-anchor="middle" class="layer-title">Part II: Distributed ML</text>
    <text x="222" y="206" text-anchor="middle" class="layer-subtitle">Training, Communication, Fault Tolerance, Orchestration</text>

    <rect x="54" y="90" width="336" height="56" rx="5" fill="#fff4e6" stroke="#d28a2e" stroke-width="2"/>
    <text x="222" y="112" text-anchor="middle" class="layer-title">Part III: Deployment at Scale</text>
    <text x="222" y="132" text-anchor="middle" class="layer-subtitle">Inference, Performance, Edge, Operations</text>

    <rect x="28" y="16" width="388" height="56" rx="5" fill="#eaf6ed" stroke="#409763" stroke-width="2"/>
    <text x="222" y="38" text-anchor="middle" class="layer-title">Part IV: The Responsible Fleet</text>
    <text x="222" y="58" text-anchor="middle" class="layer-subtitle">Security, Robustness, Sustainability, Governance</text>

    <path d="M222 238 V226" stroke="#3478b9" stroke-width="1.8" fill="none" marker-end="url(#up-arrow)"/>
    <path d="M222 164 V152" stroke="#3478b9" stroke-width="1.8" fill="none" marker-end="url(#up-arrow)"/>
    <path d="M222 90 V78" stroke="#3478b9" stroke-width="1.8" fill="none" marker-end="url(#up-arrow)"/>

    <g>
      <line x1="416" y1="44" x2="456" y2="44" stroke="#95a1ad" stroke-width="1.4"/>
      <text x="472" y="39" class="side-title">Governance</text>
      <text x="472" y="55" class="side-detail">Security, sustainability</text>

      <line x1="390" y1="118" x2="456" y2="118" stroke="#95a1ad" stroke-width="1.4"/>
      <text x="472" y="113" class="side-title">Serving</text>
      <text x="472" y="129" class="side-detail">Inference, operations</text>

      <line x1="434" y1="192" x2="456" y2="192" stroke="#95a1ad" stroke-width="1.4"/>
      <text x="472" y="187" class="side-title">Distribution</text>
      <text x="472" y="203" class="side-detail">Parallelism, coordination</text>

      <line x1="402" y1="266" x2="456" y2="266" stroke="#95a1ad" stroke-width="1.4"/>
      <text x="472" y="261" class="side-title">Infrastructure</text>
      <text x="472" y="277" class="side-detail">Power, bandwidth, storage</text>
    </g>
  </g>

  <line x1="86" y1="372" x2="634" y2="372" stroke="#d6dde4" stroke-width="1"/>
  <text x="360" y="394" text-anchor="middle" class="note">Engineering decisions at the bottom constrain possibilities at the top.</text>
</svg>
