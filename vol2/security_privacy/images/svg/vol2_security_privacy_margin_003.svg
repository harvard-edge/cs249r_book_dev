<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 72" role="img" aria-labelledby="title desc" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <title id="title">Privacy Budget Composition</title>
  <desc id="desc">Budget envelope showing ten privacy-consuming queries reaching an epsilon budget limit of 10.</desc>
  <rect width="132" height="72" fill="#fff"/>
  <rect x="58" y="28" width="57" height="15" fill="#d21f32"/>
  <rect x="115" y="18" width="6" height="35" fill="#f9d6d5"/>
  <line x1="115" y1="14" x2="115" y2="58" stroke="#d21f32" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="8" y="33" font-size="10" fill="#333">10</text>
  <text x="8" y="45" font-size="10" fill="#333">queries</text>
  <text x="86.5" y="39" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">10</text>
  <text x="109" y="13" text-anchor="end" font-size="10" font-weight="700" fill="#d21f32">eps=10</text>
  <text x="66" y="64" text-anchor="middle" font-size="8.5" fill="#777">budget limit</text>
</svg>
