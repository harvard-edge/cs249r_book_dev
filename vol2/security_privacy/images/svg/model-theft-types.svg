<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <defs>
    <marker id="arr-mt" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arr-red-mt" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff"/>

  <!-- Column headers -->
  <rect x="20" y="20" width="290" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="165" y="45" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Exact Artifact Theft</text>

  <rect x="370" y="20" width="290" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="515" y="45" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Approximate Behavioral Theft</text>

  <!-- Center label: access mode differs -->
  <rect x="250" y="220" width="180" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="340" y="239" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Different access paths</text>
  <text x="340" y="252" font-size="8.5" fill="#555" text-anchor="middle">same business risk</text>

  <!-- === LEFT WORKFLOW: Exact Artifact Theft === -->

  <!-- Step 1L: Access model artifact -->
  <rect x="30" y="80" width="270" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <!-- Attacker icon -->
  <circle cx="58" cy="105" r="10" fill="#c44" opacity="0.25"/>
  <text x="57" y="109" font-size="10" fill="#c44" text-anchor="middle">👤</text>
  <text x="165" y="101" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Access model artifact</text>
  <text x="165" y="117" font-size="8.5" fill="#555" text-anchor="middle">Checkpoint, registry, device image, or file</text>

  <line x1="165" y1="130" x2="165" y2="150" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 2L: Extract internal properties -->
  <rect x="30" y="150" width="270" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="165" y="171" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Extract internal properties</text>
  <!-- Dataset icon: small table representation -->
  <rect x="38" y="163" width="32" height="20" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="38" y1="170" x2="70" y2="170" stroke="#4a90c4" stroke-width="0.5"/>
  <line x1="50" y1="163" x2="50" y2="183" stroke="#4a90c4" stroke-width="0.5"/>
  <text x="165" y="187" font-size="8.5" fill="#555" text-anchor="middle">Weights, architecture, hyperparameters</text>

  <line x1="165" y1="200" x2="165" y2="280" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 3L: Reconstruct original model -->
  <rect x="30" y="280" width="270" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="165" y="298" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Reconstruct original model</text>
  <!-- Model icon: layered rectangles -->
  <rect x="38" y="305" width="34" height="4" fill="#4a90c4" opacity="0.8"/>
  <rect x="40" y="313" width="30" height="4" fill="#4a90c4" opacity="0.6"/>
  <rect x="42" y="321" width="26" height="4" fill="#4a90c4" opacity="0.4"/>
  <text x="165" y="317" font-size="8.5" fill="#555" text-anchor="middle">Load recovered parameters and structure</text>
  <text x="165" y="331" font-size="8.5" fill="#555" text-anchor="middle">No retraining or API probing required</text>

  <line x1="165" y1="340" x2="165" y2="360" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 4L: Exact copy -->
  <rect x="30" y="360" width="270" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="165" y="383" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Exact model copy</text>
  <text x="165" y="399" font-size="8.5" fill="#555" text-anchor="middle">Use or resell proprietary IP</text>
  <text x="165" y="412" font-size="8.5" fill="#555" text-anchor="middle">Bypass original training investment</text>

  <!-- === RIGHT WORKFLOW: Approximate Behavioral Theft === -->

  <!-- Step 1R: Queries API -->
  <rect x="380" y="80" width="270" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <circle cx="408" cy="105" r="10" fill="#c44" opacity="0.25"/>
  <text x="407" y="109" font-size="10" fill="#c44" text-anchor="middle">👤</text>
  <text x="515" y="101" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Query deployed API</text>
  <text x="515" y="117" font-size="8.5" fill="#555" text-anchor="middle">Targeted or systematic black-box inputs</text>

  <line x1="515" y1="130" x2="515" y2="150" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 2R: Observe outputs -->
  <rect x="380" y="150" width="270" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="515" y="171" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Observe output signals</text>
  <text x="515" y="187" font-size="8.5" fill="#555" text-anchor="middle">Labels, logits, embeddings, confidence scores</text>

  <line x1="515" y1="200" x2="515" y2="280" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 3R: Train surrogate -->
  <rect x="380" y="280" width="270" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="515" y="298" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Train surrogate model</text>
  <!-- Smaller model icon -->
  <rect x="388" y="309" width="28" height="4" fill="#4a90c4" opacity="0.8"/>
  <rect x="390" y="317" width="24" height="4" fill="#4a90c4" opacity="0.5"/>
  <text x="515" y="317" font-size="8.5" fill="#555" text-anchor="middle">Fit behavior from input-output pairs</text>
  <text x="515" y="331" font-size="8.5" fill="#555" text-anchor="middle">or distill soft-label outputs</text>

  <line x1="515" y1="340" x2="515" y2="360" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 4R: Functional clone (lower fidelity) -->
  <rect x="380" y="360" width="270" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="515" y="383" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Functional clone</text>
  <text x="515" y="399" font-size="8.5" fill="#555" text-anchor="middle">Approximate task behavior; fidelity</text>
  <text x="515" y="412" font-size="8.5" fill="#555" text-anchor="middle">depends on query budget and output richness</text>

  <!-- Bottom annotation -->
  <text x="340" y="435" font-size="9" fill="#555" text-anchor="middle" font-style="italic">Exact theft is an artifact-security failure; approximate theft is an interface-security failure.</text>
  <text x="340" y="448" font-size="9" fill="#555" text-anchor="middle" font-style="italic">Defenses combine signing, encryption, access control, rate limiting, output limiting, and auditing.</text>
</svg>
