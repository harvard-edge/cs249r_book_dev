<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500">
  <rect width="680" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Five-Level Network Model for ML Training</text>

  <!-- ===== Level 5: Cluster Design (Compute blue) ===== -->
  <rect x="60" y="50" width="560" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="80" y="70" font-size="11" font-weight="700" fill="#4a90c4">Level 5 — Cluster Design</text>
  <text x="80" y="90" font-size="9.5" font-weight="700" fill="#333">SuperPOD · Grand Teton · production fabric integration</text>
  <text x="80" y="110" font-size="9" fill="#555">Job placement · failure domains · multi-rail wiring · operations</text>
  <!-- Badge -->
  <rect x="560" y="60" width="40" height="20" fill="#a31f34"/>
  <text x="580" y="74" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">L5</text>

  <!-- ===== Level 4: Fabric Behavior (Data green) ===== -->
  <rect x="60" y="130" width="560" height="70" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="80" y="150" font-size="11" font-weight="700" fill="#3d9e5a">Level 4 — Fabric Behavior</text>
  <text x="80" y="170" font-size="9.5" font-weight="700" fill="#333">PFC · DCQCN · HPCC · adaptive routing</text>
  <text x="80" y="190" font-size="9" fill="#555">Congestion spreading · incast · tail latency · fabric-wide stalls</text>
  <!-- Badge -->
  <rect x="560" y="140" width="40" height="20" fill="#a31f34"/>
  <text x="580" y="154" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">L4</text>

  <!-- ===== Level 3: Switch and Topology (Routing orange) ===== -->
  <rect x="60" y="210" width="560" height="70" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="80" y="230" font-size="11" font-weight="700" fill="#c87b2a">Level 3 — Switch and Topology</text>
  <text x="80" y="250" font-size="9.5" font-weight="700" fill="#333">Fat-tree · rail-optimized · Dragonfly · switch radix</text>
  <text x="80" y="270" font-size="9" fill="#555">Bisection bandwidth · hop count · ECMP · topology selection</text>
  <!-- Badge -->
  <rect x="560" y="220" width="40" height="20" fill="#a31f34"/>
  <text x="580" y="234" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">L3</text>

  <!-- ===== Level 2: Transport (Neutral) ===== -->
  <rect x="60" y="290" width="560" height="70" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="80" y="310" font-size="11" font-weight="700" fill="#555">Level 2 — Transport</text>
  <text x="80" y="330" font-size="9.5" font-weight="700" fill="#333">RDMA · GPUDirect · RoCEv2 · α-β model</text>
  <text x="80" y="350" font-size="9" fill="#555">Zero-copy DMA · verbs API · retransmission behavior · latency/bandwidth terms</text>
  <!-- Badge -->
  <rect x="560" y="300" width="40" height="20" fill="#a31f34"/>
  <text x="580" y="314" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">L2</text>

  <!-- ===== Level 1: Wire and Link (Neutral) ===== -->
  <rect x="60" y="370" width="560" height="70" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="80" y="390" font-size="11" font-weight="700" fill="#555">Level 1 — Wire and Link</text>
  <text x="80" y="410" font-size="9.5" font-weight="700" fill="#333">PAM4 / NRZ · SerDes · DAC · AOC · pluggable optics</text>
  <text x="80" y="430" font-size="9" fill="#555">Ethernet/InfiniBand links · FEC · link budget · cable reach · signal-to-noise</text>
  <!-- Badge -->
  <rect x="560" y="380" width="40" height="20" fill="#a31f34"/>
  <text x="580" y="394" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">L1</text>

  <!-- Vertical direction arrow -->
  <line x1="30" y1="440" x2="30" y2="50" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="20" y="250" text-anchor="middle" font-size="9" fill="#555" transform="rotate(-90, 20, 250)">Abstraction increases →</text>

  <!-- Bottom footnote -->
  <text x="340" y="470" text-anchor="middle" font-size="9" fill="#999" font-style="italic">The chapter model runs from wire/link mechanics through transport, topology, fabric behavior, and cluster design.</text>
</svg>
