<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <title id="title">Bandwidth hierarchy across GPU generations</title>
  <desc id="desc">Grouped bar chart comparing HBM, NVLink, InfiniBand, and PCIe bandwidth from V100 to B200 on a logarithmic scale.</desc>
  <defs>
    <style>
      text { fill: #111827; }
      .axis { stroke: #111827; stroke-width: 1.5; }
      .grid { stroke: #d8dee6; stroke-width: 1; stroke-dasharray: 5 5; }
      .tick { font-size: 17px; }
      .label { font-size: 18px; }
      .legend { font-size: 16px; }
      .ratio { fill: #cb202d; font-size: 14px; font-weight: 700; }
    </style>
  </defs>

  <rect width="960" height="600" fill="#ffffff"/>

  <g id="plot" transform="translate(110 70)">
    <rect x="0" y="0" width="750" height="375" fill="#ffffff"/>
    <line class="grid" x1="0" x2="750" y1="344" y2="344"/>
    <line class="grid" x1="0" x2="750" y1="239" y2="239"/>
    <line class="grid" x1="0" x2="750" y1="135" y2="135"/>
    <line class="grid" x1="0" x2="750" y1="31" y2="31"/>

    <line class="axis" x1="0" y1="0" x2="0" y2="375"/>
    <line class="axis" x1="0" y1="375" x2="750" y2="375"/>

    <text class="tick" x="-18" y="348" text-anchor="end">10</text>
    <text class="tick" x="-18" y="243" text-anchor="end">100</text>
    <text class="tick" x="-18" y="139" text-anchor="end">1000</text>
    <text class="tick" x="-18" y="35" text-anchor="end">10000</text>

    <g transform="translate(95 0)">
      <rect x="-39" y="140" width="24" height="235" fill="#006395" opacity="0.85"/>
      <rect x="-13" y="181" width="24" height="194" fill="#008f45" opacity="0.85"/>
      <rect x="13" y="304" width="24" height="71" fill="#e67817" opacity="0.85"/>
      <rect x="39" y="323" width="24" height="52" fill="#78458b" opacity="0.85"/>
      <rect x="-27" y="166" width="42" height="20" rx="5" fill="#ffffff" stroke="#cb202d"/>
      <text class="ratio" x="-6" y="181" text-anchor="middle">12x</text>
      <text class="tick" x="0" y="407" text-anchor="middle">V100</text>
      <text class="tick" x="0" y="427" text-anchor="middle">(2017)</text>
    </g>

    <g transform="translate(280 0)">
      <rect x="-39" y="105" width="24" height="270" fill="#006395" opacity="0.85"/>
      <rect x="-13" y="148" width="24" height="227" fill="#008f45" opacity="0.85"/>
      <rect x="13" y="304" width="24" height="71" fill="#e67817" opacity="0.85"/>
      <rect x="39" y="294" width="24" height="81" fill="#78458b" opacity="0.85"/>
      <rect x="-27" y="133" width="42" height="20" rx="5" fill="#ffffff" stroke="#cb202d"/>
      <text class="ratio" x="-6" y="148" text-anchor="middle">25x</text>
      <text class="tick" x="0" y="407" text-anchor="middle">A100</text>
      <text class="tick" x="0" y="427" text-anchor="middle">(2020)</text>
    </g>

    <g transform="translate(465 0)">
      <rect x="-39" y="82" width="24" height="293" fill="#006395" opacity="0.85"/>
      <rect x="-13" y="140" width="24" height="235" fill="#008f45" opacity="0.85"/>
      <rect x="13" y="274" width="24" height="101" fill="#e67817" opacity="0.85"/>
      <rect x="39" y="263" width="24" height="112" fill="#78458b" opacity="0.85"/>
      <rect x="-27" y="125" width="42" height="20" rx="5" fill="#ffffff" stroke="#cb202d"/>
      <text class="ratio" x="-6" y="140" text-anchor="middle">19x</text>
      <text class="tick" x="0" y="407" text-anchor="middle">H100</text>
      <text class="tick" x="0" y="427" text-anchor="middle">(2022)</text>
    </g>

    <g transform="translate(650 0)">
      <rect x="-39" y="41" width="24" height="334" fill="#006395" opacity="0.85"/>
      <rect x="-13" y="108" width="24" height="267" fill="#008f45" opacity="0.85"/>
      <rect x="13" y="239" width="24" height="136" fill="#e67817" opacity="0.85"/>
      <rect x="39" y="263" width="24" height="112" fill="#78458b" opacity="0.85"/>
      <rect x="-27" y="93" width="42" height="20" rx="5" fill="#ffffff" stroke="#cb202d"/>
      <text class="ratio" x="-6" y="108" text-anchor="middle">18x</text>
      <text class="tick" x="0" y="407" text-anchor="middle">B200</text>
      <text class="tick" x="0" y="427" text-anchor="middle">(2024)</text>
    </g>

    <text class="label" x="375" y="468" text-anchor="middle">GPU Generation</text>
    <text class="label" x="-74" y="188" text-anchor="middle" transform="rotate(-90 -74 188)">Bandwidth (GB/s, log scale)</text>

    <g transform="translate(25 20)">
      <rect x="0" y="0" width="200" height="70" rx="5" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="14" y="12" width="28" height="12" fill="#006395" opacity="0.85"/>
      <text class="legend" x="52" y="24">HBM</text>
      <rect x="112" y="12" width="28" height="12" fill="#e67817" opacity="0.85"/>
      <text class="legend" x="150" y="24">InfiniBand</text>
      <rect x="14" y="42" width="28" height="12" fill="#008f45" opacity="0.85"/>
      <text class="legend" x="52" y="54">NVLink</text>
      <rect x="112" y="42" width="28" height="12" fill="#78458b" opacity="0.85"/>
      <text class="legend" x="150" y="54">PCIe</text>
    </g>
  </g>
</svg>
