<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 82" role="img" aria-labelledby="title desc" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <title id="title">Synchronization Tax</title>
  <desc id="desc">Two-point trend showing high kernel efficiency falling to lower fleet efficiency because of synchronization tax.</desc>
  <rect width="130" height="82" fill="#fff"/>
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>
  <text x="27" y="14" text-anchor="middle" font-size="10" fill="#555">kernel</text>
  <text x="103" y="14" text-anchor="middle" font-size="10" fill="#555">fleet</text>
  <path d="M28 26 H58 V44 H96" fill="none" stroke="#a31f34" stroke-width="3" marker-end="url(#arrow-red)"/>
  <circle cx="28" cy="26" r="4" fill="#a31f34"/>
  <circle cx="96" cy="44" r="4" fill="#a31f34"/>
  <rect x="38" y="54" width="60" height="16" rx="3" fill="#fff" stroke="#f9d6d5" stroke-width="1"/>
  <text x="68" y="65" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">sync tax</text>
  <text x="28" y="75" text-anchor="middle" font-size="8.5" fill="#555">high</text>
  <text x="96" y="75" text-anchor="middle" font-size="8.5" fill="#555">lower</text>
</svg>
