<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <title id="title">Fleet Stack and Scale</title>
  <desc id="desc">Layered fleet stack with an upward arrow labeled scale creates qualitative change.</desc>
  <defs>
    <style>
.label { font-size: 10px; font-weight: 700; }
      .layer-title { font-size: 17px; font-weight: 700; fill: #14213d; }
      .layer-subtitle { font-size: 15px; fill: #14213d; }
      .arrow-label { font-size: 12px; font-weight: 700; fill: #3c4651; }
      .note { font-size: 11px; fill: #4f5b66; }
    </style>
    <marker id="arrow-up" markerWidth="11" markerHeight="9" refX="10" refY="4.5" orient="auto">
      <path d="M0,0 L11,4.5 L0,9 Z" fill="#67717d"/>
    </marker>
  </defs>

  <rect width="720" height="420" fill="#ffffff"/>

  <g transform="translate(70 38)">
    <text x="86" y="38" text-anchor="end" class="label" fill="#409763">Governance</text>
    <text x="86" y="117" text-anchor="end" class="label" fill="#d28a2e">Serving</text>
    <text x="86" y="196" text-anchor="end" class="label" fill="#7567b3">Distribution</text>
    <text x="86" y="275" text-anchor="end" class="label" fill="#3478b9">Infrastructure</text>

    <rect x="118" y="8" width="380" height="58" rx="5" fill="#eaf6ed" stroke="#409763" stroke-width="2"/>
    <text x="308" y="31" text-anchor="middle" class="layer-title">IV. The Responsible Fleet</text>
    <text x="308" y="52" text-anchor="middle" class="layer-subtitle">Security | Robustness | Responsible AI | Sustainability</text>

    <rect x="118" y="87" width="380" height="58" rx="5" fill="#fff4e6" stroke="#d28a2e" stroke-width="2"/>
    <text x="308" y="110" text-anchor="middle" class="layer-title">III. Deployment at Scale</text>
    <text x="308" y="131" text-anchor="middle" class="layer-subtitle">Inference | Performance | Edge | Ops</text>

    <rect x="118" y="166" width="380" height="58" rx="5" fill="#f0edf9" stroke="#7567b3" stroke-width="2"/>
    <text x="308" y="189" text-anchor="middle" class="layer-title">II. Distributed ML</text>
    <text x="308" y="210" text-anchor="middle" class="layer-subtitle">Parallelism | Communication | Fault Tolerance</text>

    <rect x="118" y="245" width="380" height="58" rx="5" fill="#eef6fd" stroke="#3478b9" stroke-width="2"/>
    <text x="308" y="268" text-anchor="middle" class="layer-title">I. The Fleet</text>
    <text x="308" y="289" text-anchor="middle" class="layer-subtitle">Compute | Network | Data</text>

    <path d="M540 274 V42" stroke="#67717d" stroke-width="3" fill="none" marker-end="url(#arrow-up)"/>
    <text x="598" y="152" text-anchor="middle" class="arrow-label">Scale Creates</text>
    <text x="598" y="169" text-anchor="middle" class="arrow-label">Qualitative</text>
    <text x="598" y="186" text-anchor="middle" class="arrow-label">Change</text>
  </g>

  <line x1="186" y1="370" x2="568" y2="370" stroke="#d6dde4" stroke-width="1"/>
  <text x="377" y="392" text-anchor="middle" class="note">Physical constraints shape distributed behavior, deployment choices, and governance obligations.</text>
</svg>
