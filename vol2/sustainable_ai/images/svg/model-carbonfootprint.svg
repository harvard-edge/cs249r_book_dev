<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 535" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="760" height="535" fill="#fff"/>
  <defs>
    <pattern id="offline-hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#f7f7f7"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#777" stroke-width="1.8"/>
    </pattern>
    <pattern id="oss-hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#f7f7f7"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#3d9e5a" stroke-width="1.8"/>
    </pattern>
  </defs>

  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Operational Carbon Footprint of Large-Scale ML Tasks</text>

  <g font-size="10" fill="#333">
    <rect x="224" y="52" width="14" height="14" fill="url(#offline-hatch)" stroke="#777" stroke-width="1"/>
    <text x="245" y="63">Offline training</text>
    <rect x="356" y="52" width="14" height="14" fill="#c87b2a" stroke="#9a5c1e" stroke-width="1"/>
    <text x="377" y="63">Online training</text>
    <rect x="485" y="52" width="14" height="14" fill="#111"/>
    <text x="506" y="63">Inference</text>
  </g>

  <g stroke="#e8e8e8" stroke-width="1">
    <line x1="82" y1="360" x2="705" y2="360"/>
    <line x1="82" y1="290" x2="705" y2="290"/>
    <line x1="82" y1="220" x2="705" y2="220"/>
    <line x1="82" y1="150" x2="705" y2="150"/>
    <line x1="82" y1="80" x2="705" y2="80"/>
  </g>

  <line x1="82" y1="80" x2="82" y2="360" stroke="#333" stroke-width="1.2"/>
  <line x1="82" y1="360" x2="705" y2="360" stroke="#333" stroke-width="1.2"/>

  <g font-size="10" fill="#555" text-anchor="end">
    <text x="74" y="364">0</text>
    <text x="74" y="224">0.50</text>
    <text x="74" y="84">1.00</text>
  </g>
  <text x="28" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#333" transform="rotate(-90 28 220)">CO2e (million kg)</text>

  <g stroke="#d9d9d9" stroke-width="1">
    <line x1="372" y1="76" x2="372" y2="406"/>
  </g>
  <text x="219" y="486" text-anchor="middle" font-size="11" font-weight="600" fill="#555">Meta production models</text>
  <text x="543" y="486" text-anchor="middle" font-size="11" font-weight="600" fill="#555">Public large-model baselines</text>
  <text x="543" y="502" text-anchor="middle" font-size="10" fill="#555">training footprint only</text>

  <!-- Meta production models: offline training, online training, inference -->
  <g stroke-width="1">
    <rect x="96" y="354.4" width="26" height="5.6" fill="url(#offline-hatch)" stroke="#777"/>
    <rect x="96" y="326.4" width="26" height="28.0" fill="#111"/>

    <rect x="140" y="262.0" width="26" height="98.0" fill="url(#offline-hatch)" stroke="#777"/>
    <rect x="140" y="250.8" width="26" height="11.2" fill="#c87b2a" stroke="#9a5c1e"/>
    <rect x="140" y="122.0" width="26" height="128.8" fill="#111"/>

    <rect x="184" y="290.0" width="26" height="70.0" fill="url(#offline-hatch)" stroke="#777"/>
    <rect x="184" y="281.6" width="26" height="8.4" fill="#c87b2a" stroke="#9a5c1e"/>
    <rect x="184" y="203.2" width="26" height="78.4" fill="#111"/>

    <rect x="228" y="323.6" width="26" height="36.4" fill="url(#offline-hatch)" stroke="#777"/>
    <rect x="228" y="318.0" width="26" height="5.6" fill="#c87b2a" stroke="#9a5c1e"/>
    <rect x="228" y="250.8" width="26" height="67.2" fill="#111"/>

    <rect x="272" y="320.8" width="26" height="39.2" fill="url(#offline-hatch)" stroke="#777"/>
    <rect x="272" y="315.2" width="26" height="5.6" fill="#c87b2a" stroke="#9a5c1e"/>
    <rect x="272" y="259.2" width="26" height="56.0" fill="#111"/>

    <rect x="316" y="315.2" width="26" height="44.8" fill="url(#offline-hatch)" stroke="#777"/>
    <rect x="316" y="309.6" width="26" height="5.6" fill="#c87b2a" stroke="#9a5c1e"/>
    <rect x="316" y="236.8" width="26" height="72.8" fill="#111"/>
  </g>

  <!-- Public baselines: training-only values from published reports -->
  <g stroke="#3d9e5a" stroke-width="1">
    <rect x="390" y="281.6" width="26" height="78.4" fill="url(#oss-hatch)"/>
    <rect x="434" y="358.8" width="26" height="1.2" fill="url(#oss-hatch)"/>
    <rect x="478" y="346.0" width="26" height="14.0" fill="url(#oss-hatch)"/>
    <rect x="522" y="334.8" width="26" height="25.2" fill="url(#oss-hatch)"/>
    <rect x="566" y="358.3" width="26" height="1.7" fill="url(#oss-hatch)"/>
    <rect x="610" y="340.4" width="26" height="19.6" fill="url(#oss-hatch)"/>
    <rect x="654" y="206.0" width="26" height="154.0" fill="url(#oss-hatch)"/>
  </g>

  <g font-size="10" fill="#333" text-anchor="end">
    <text x="109" y="386" transform="rotate(-60 109 386)">LM</text>
    <text x="153" y="386" transform="rotate(-60 153 386)">RM-1</text>
    <text x="197" y="386" transform="rotate(-60 197 386)">RM-2</text>
    <text x="241" y="386" transform="rotate(-60 241 386)">RM-3</text>
    <text x="285" y="386" transform="rotate(-60 285 386)">RM-4</text>
    <text x="329" y="386" transform="rotate(-60 329 386)">RM-5</text>
    <text x="403" y="386" transform="rotate(-60 403 386)">BERT-NAS</text>
    <text x="447" y="386" transform="rotate(-60 447 386)">Evolved Transformer</text>
    <text x="491" y="386" transform="rotate(-60 491 386)">T5</text>
    <text x="535" y="386" transform="rotate(-60 535 386)">Meena</text>
    <text x="579" y="386" transform="rotate(-60 579 386)">GShard-600B</text>
    <text x="623" y="386" transform="rotate(-60 623 386)">Switch Transformer</text>
    <text x="667" y="386" transform="rotate(-60 667 386)">GPT-3</text>
  </g>

  <g stroke="#333" stroke-width="1">
    <line x1="109" y1="360" x2="109" y2="365"/>
    <line x1="153" y1="360" x2="153" y2="365"/>
    <line x1="197" y1="360" x2="197" y2="365"/>
    <line x1="241" y1="360" x2="241" y2="365"/>
    <line x1="285" y1="360" x2="285" y2="365"/>
    <line x1="329" y1="360" x2="329" y2="365"/>
    <line x1="403" y1="360" x2="403" y2="365"/>
    <line x1="447" y1="360" x2="447" y2="365"/>
    <line x1="491" y1="360" x2="491" y2="365"/>
    <line x1="535" y1="360" x2="535" y2="365"/>
    <line x1="579" y1="360" x2="579" y2="365"/>
    <line x1="623" y1="360" x2="623" y2="365"/>
    <line x1="667" y1="360" x2="667" y2="365"/>
  </g>

  <text x="705" y="522" text-anchor="end" font-size="9" fill="#777" font-style="italic">Redrawn from Wu et al. 2022; public baselines are training-only.</text>
</svg>
