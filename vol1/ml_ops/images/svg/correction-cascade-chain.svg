<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="360" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Cascade arcs: an upstream change to Model A propagates downstream ===== -->
  <!-- the further downstream, the longer (and higher) the arc -->
  <path d="M100,160 Q180,90 258,160" fill="none" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <path d="M100,160 Q260,40 418,160" fill="none" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <path d="M100,160 Q340,10 578,160" fill="none" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>

  <!-- change trigger on Model A -->
  <rect x="66" y="136" width="68" height="18" rx="9" fill="#a31f34"/>
  <text x="100" y="149" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">change</text>

  <!-- ===== The correction chain: each model is trained to fix the previous one ===== -->
  <!-- forward correction-dependency arrows (gray) -->
  <line x1="162" y1="198" x2="196" y2="198" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="322" y1="198" x2="356" y2="198" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="482" y1="198" x2="516" y2="198" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- model boxes -->
  <rect x="40" y="170" width="120" height="56" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Model A</text>
  <text x="100" y="210" text-anchor="middle" font-size="9" font-weight="400" fill="#555">base predictions</text>

  <rect x="200" y="170" width="120" height="56" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="260" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Model B</text>
  <text x="260" y="210" text-anchor="middle" font-size="9" font-weight="400" fill="#555">corrects A</text>

  <rect x="360" y="170" width="120" height="56" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="420" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Model C</text>
  <text x="420" y="210" text-anchor="middle" font-size="9" font-weight="400" fill="#555">corrects B</text>

  <rect x="520" y="170" width="120" height="56" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="580" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Model D</text>
  <text x="580" y="210" text-anchor="middle" font-size="9" font-weight="400" fill="#555">corrects C</text>

  <!-- downstream breakage tags -->
  <text x="260" y="244" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">must re-correct</text>
  <text x="420" y="244" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">must re-correct</text>
  <text x="580" y="244" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">must re-correct</text>

  <!-- ===== Legend ===== -->
  <line x1="120" y1="290" x2="150" y2="290" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="158" y="293" text-anchor="start" font-size="9" font-weight="400" fill="#555">correction dependency</text>

  <line x1="360" y1="290" x2="390" y2="290" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="398" y="293" text-anchor="start" font-size="9" font-weight="400" fill="#555">change propagates downstream</text>

  <!-- ===== Insight footnote ===== -->
  <text x="340" y="330" text-anchor="middle" font-size="9" font-style="italic" fill="#999">A single fix to an upstream model forces every downstream correction to be redone.</text>
</svg>
